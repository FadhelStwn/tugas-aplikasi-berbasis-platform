<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://code.jquery.com/jquery-4.0.0.js"
        integrity="sha256-9fsHeVnKBvqh3FB2HYu7g2xseAZ5MlN6Kz/qnkASV8U=" crossorigin="anonymous"></script>
    <title>Tugas 4 - AJAX</title>
</head>
<body>
    <h2>The jQuery AJAX</h2>
    <p id="demo">Let ajax change this text.</p>

    <button type="button" id="changeBtn">Change Content</button>
    <script>
        $(document).ready(function(){
            $("#changeBtn").click(function(){
                $("#demo").load("ajax_info.txt");
            });
        });
    </script>
</body>
</html>
